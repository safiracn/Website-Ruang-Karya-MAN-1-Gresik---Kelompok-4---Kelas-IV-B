<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header MAN 1 Gresik</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body class="font-sans">

<!-- TOP HEADER -->
<div class="bg-blue-900 text-white text-sm">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-2">

    <!-- Contact -->
    <div class="flex items-center gap-6">
      <span class="flex items-center gap-2">
        <i class="fa-solid fa-phone"></i> +031-3949544
      </span>
      <span class="flex items-center gap-2">
        <i class="fa-solid fa-envelope"></i> mangresik@kemenag.go.id
      </span>
    </div>

    <!-- Social + Button -->
    <div class="flex items-center gap-4">
      <i class="fab fa-facebook-f"></i>
      <i class="fab fa-twitter"></i>
      <i class="fab fa-youtube"></i>
      <i class="fab fa-google-plus-g"></i>
    
  <div class="flex gap-2">
  <button class="bg-yellow-400 px-4 py-1 rounded">Daftar</button>
  <button class="bg-yellow-400 px-4 py-1 rounded">Masuk</button>
</div>
 </div>

  </div>
</div>

<!-- MAIN HEADER -->
<header class="bg-white shadow">
  <div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">

    <!-- Logo + Text -->
    <div class="flex items-center gap-5">

      <img src="images/LOGO.png" alt="Logo MAN 1 Gresik" class="h-16 md:h-20">

      <div>
        <h1 class="text-2xl md:text-3xl font-bold text-blue-900">Ruang Karya </h1>
        <h2 class="text-lg md:text-xl italic font-semibold text-blue-900"> MAN 1 Gresik </h2>
        <p class="text-xs md:text-sm italic text-blue-800"> Islami, Cerdas, Unggul, Kompetitif, & Peduli Lingkungan </p>
      </div>

    </div>

    <!-- Menu -->
    <nav>
      <ul class="flex items-center gap-8 text-blue-900 font-semibold">

        <li>
          <a href="#" class="hover:text-yellow-500 transition">Beranda</a>
        </li>

        <li>
          <a href="#" class="hover:text-yellow-500 transition">Katalog</a>
        </li>

        <li>
          <a href="#" class="hover:text-yellow-500 transition">Akun Saya</a>
        </li>

        <li>
          <a href="#" class="hover:text-yellow-500 transition">Keranjang</a>
        </li>

      </ul>
    </nav>

  </div>
</header>


</body>
</html>
